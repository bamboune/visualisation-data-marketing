name: Mettre à jour le dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # tous les jours à 6h UTC (2h Montréal)
  workflow_dispatch:       # permet le déclenchement manuel

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Créer fichier service account
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > service_account.json
      
      - name: Générer dashboard
        run: python generate_dashboard.py
      
      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git rebase origin/main
          git add data.json
          git commit -m "Mise à jour automatique du dashboard" || exit 0
          git push
